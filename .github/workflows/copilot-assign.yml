name: Auto-assign issues to Copilot

# This workflow posts a comment @github-copilot when a new issue is opened,
# which triggers the GitHub Copilot coding agent (if enabled for the org).
#
# It requires a Personal Access Token (PAT) stored as COPILOT_TRIGGER_PAT
# because the @github-copilot mention only triggers the agent when posted
# by a real user token — not the built-in GITHUB_TOKEN (bot).
#
# How to create the PAT (classic token is simplest):
#   1. Sign in as @OndrejMottl (or any org member with a Copilot seat)
#   2. Go to Settings → Developer settings → Personal access tokens → Tokens (classic)
#   3. Click "Generate new token (classic)"
#   4. Select the "repo" scope (this includes write access to issue comments)
#   5. Copy the token and add it as a repository secret named COPILOT_TRIGGER_PAT
#      (Repository Settings → Secrets and variables → Actions → New repository secret)
#
# Manual trigger (alternative):
#   Open the issue → add a comment: @github-copilot use agent: website-maintainer
#   Read all instructions in .github/ first (especially .github/agents/website-maintainer.agent.md),
#   then follow the full issue → PR workflow defined there.

on:
  issues:
    types: [opened]

jobs:
  assign-to-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Post agent instructions as prompt comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TRIGGER_PAT }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '@github-copilot Use the **website-maintainer** custom agent. Read all instructions in `.github/` first (especially `.github/agents/website-maintainer.agent.md`), then follow the full issue → PR workflow defined there.',
            });
