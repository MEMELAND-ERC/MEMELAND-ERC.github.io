name: Auto-assign issues to Copilot

# This workflow posts a comment @github-copilot when a new issue is opened,
# which triggers the GitHub Copilot coding agent (if enabled for the org).
#
# It requires a Personal Access Token (PAT) stored as COPILOT_TRIGGER_PAT.
# The built-in GITHUB_TOKEN cannot assign copilot-swe-agent[bot]; a real user
# token from someone with a Copilot seat is required.
#
# How to create the PAT (classic token is simplest):
#   1. Sign in as @OndrejMottl (must have an active Copilot seat)
#   2. Go to Settings → Developer settings → Personal access tokens → Tokens (classic)
#   3. Click "Generate new token (classic)"
#   4. Select the "repo" scope (covers issues, pull_requests, contents, actions)
#   5. Copy the token and add it as a repository secret named COPILOT_TRIGGER_PAT
#      (Repository Settings → Secrets and variables → Actions → New repository secret)
#
# If using a fine-grained PAT instead, it needs ALL of the following:
#   - Metadata: Read-only
#   - Actions: Read and write
#   - Contents: Read and write
#   - Issues: Read and write
#   - Pull requests: Read and write
# (Missing any one of these will cause a 403 error.)
on:
  issues:
    types: [opened]

jobs:
  assign-to-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to Copilot Coding Agent
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TRIGGER_PAT }}
          script: |
            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ['copilot-swe-agent[bot]'],
              agent_assignment: {
                target_repo: `${context.repo.owner}/${context.repo.repo}`,
                base_branch: 'main',
                custom_agent: 'website-maintainer',
                custom_instructions: 'Read all instructions in .github/ first (especially .github/agents/website-maintainer.agent.md), then follow the full issue → PR workflow defined there.',
                model: ''
              },
              headers: {
                'X-GitHub-Api-Version': '2022-11-28'
              }
            });
