name: Re-render site after merge

# Runs whenever a PR is merged into main.
# Purpose: guarantees the published docs/ is always based on the final state
# of main, regardless of the order in which PRs were merged.
# The commit produced by this workflow is tagged [no-render] so it does
# not trigger another run of this workflow.

on:
  push:
    branches:
      - main

jobs:
  rerender:
    # Skip the commit that this workflow itself produces to avoid infinite loops.
    if: "!contains(github.event.head_commit.message, '[no-render]')"

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Quarto
        run: |
          wget -q https://quarto.org/download/latest/quarto-linux-amd64.deb
          sudo dpkg -i quarto-linux-amd64.deb
          quarto --version

      - name: Render English
        run: quarto render --profile english

      - name: Render German
        run: quarto render --profile german

      - name: Render French
        run: quarto render --profile french

      - name: Render Czech
        run: quarto render --profile czech

      - name: Render Norwegian
        run: quarto render --profile norwegian

      - name: Create root redirect to English version
        run: |
          cat <<'EOF' > docs/index.html
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta http-equiv="refresh" content="0; url=en/index.html" />
              <link rel="canonical" href="https://memeland-erc.github.io/en/index.html" />
              <title>Redirecting to English version...</title>
            </head>
            <body>
              <p>If you are not redirected automatically, <a href="en/index.html">click here</a>.</p>
            </body>
          </html>
          EOF

      - name: Commit updated docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if docs/ actually changed after re-render
          if git diff --cached --quiet; then
            echo "No changes in docs/ — nothing to commit."
          else
            git commit -m "chore: re-render site after merge [no-render]"
            git push origin main
          fi
